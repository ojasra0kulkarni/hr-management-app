<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HRNexus — HR Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a237e;--navy-dk:#0d1454;--navy-lt:#3949ab;
  --teal:#00897b;--teal-lt:#4db6ac;
  --amber:#f59e0b;--red:#ef4444;--green:#10b981;
  --bg:#f0f2f8;--card:#fff;--border:#e2e5f0;
  --text:#1e2235;--muted:#6b7280;--light:#f8f9fc;
  --sw:260px;
  --sh:0 2px 16px rgba(26,35,126,.08);
  --shl:0 8px 32px rgba(26,35,126,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit}

/* ─── LOGIN ─── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d1454 0%,#1a237e 55%,#283593 100%);position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 70%,rgba(0,137,123,.22) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(57,73,171,.28) 0%,transparent 50%)}
.login-box{background:#fff;border-radius:20px;padding:48px 44px;width:420px;max-width:95vw;
  box-shadow:var(--shl);position:relative;z-index:1}
.login-logo .brand{font-family:'Playfair Display',serif;font-size:26px;color:var(--navy);font-weight:700;text-align:center}
.login-logo .brand span{color:var(--teal)}
.login-logo p{color:var(--muted);font-size:13px;text-align:center;margin-top:4px;margin-bottom:28px}

/* ─── FORMS ─── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:9px;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;background:var(--light)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy-lt);
  box-shadow:0 0 0 3px rgba(57,73,171,.1);background:#fff}
.fg input.err,.fg select.err,.fg textarea.err{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important}
.fg .err-msg{color:var(--red);font-size:11px;margin-top:3px;display:none}
.fg.has-err .err-msg{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

/* ─── BUTTONS ─── */
.btn{padding:10px 20px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;
  font-weight:600;font-size:13.5px;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-dk);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,35,126,.3)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#00796b}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:7px}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--navy);color:var(--navy);background:var(--light)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#059669}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#d97706}
.btn-block{width:100%;justify-content:center}

/* ─── LAYOUT ─── */
#app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:linear-gradient(180deg,var(--navy-dk),var(--navy));
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-brand .title{font-family:'Playfair Display',serif;color:#fff;font-size:18px;font-weight:700}
.sb-brand .title span{color:var(--teal-lt)}
.role-badge{display:inline-block;padding:3px 10px;background:rgba(255,255,255,.12);
  border-radius:20px;font-size:11px;color:rgba(255,255,255,.8);margin-top:5px}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px}
.sb-user .av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
  color:#fff;flex-shrink:0;overflow:hidden}
.sb-user .av img{width:100%;height:100%;object-fit:cover}
.sb-user .nm{color:#fff;font-size:13px;font-weight:600}
.sb-user .un{color:rgba(255,255,255,.55);font-size:11px}
nav{padding:10px 0;flex:1}
.nav-sec{padding:8px 20px 4px;font-size:10px;font-weight:700;
  color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;
  color:rgba(255,255,255,.7);cursor:pointer;font-size:13.5px;font-weight:500;
  transition:all .18s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.13);color:#fff;
  border-left-color:var(--teal-lt);font-weight:600}
.nav-item .ico{width:18px;text-align:center;font-size:15px}
.sb-bot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 30px;height:58px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;
  top:0;z-index:50;box-shadow:0 1px 8px rgba(26,35,126,.05)}
.topbar h1{font-size:17px;font-weight:700}
.content{padding:26px 30px;flex:1}

/* ─── STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:13px;padding:20px 22px;box-shadow:var(--sh);
  border:1px solid var(--border);display:flex;align-items:center;gap:14px}
.stat-ico{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:21px;flex-shrink:0}
.stat-ico.n{background:rgba(26,35,126,.1)}.stat-ico.t{background:rgba(0,137,123,.1)}
.stat-ico.a{background:rgba(245,158,11,.1)}.stat-ico.g{background:rgba(16,185,129,.1)}
.stat-val{font-size:27px;font-weight:700;line-height:1}
.stat-lbl{font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:500}

/* ─── CARD ─── */
.card{background:#fff;border-radius:13px;box-shadow:var(--sh);border:1px solid var(--border)}
.card-hdr{padding:16px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.card-hdr h2{font-size:14.5px;font-weight:700}
.card-body{padding:22px}

/* ─── TABLE ─── */
.table-wrap{overflow-x:auto;border-radius:13px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--light);padding:10px 15px;text-align:left;font-size:11px;
  font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;
  border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:11px 15px;border-bottom:1px solid #f0f2f8;font-size:13.5px}
tbody tr:hover{background:#f8f9ff}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg-green{background:#d1fae5;color:#065f46}.bg-red{background:#fee2e2;color:#991b1b}
.bg-amber{background:#fef3c7;color:#92400e}.bg-blue{background:#dbeafe;color:#1e40af}
.bg-gray{background:#f3f4f6;color:#374151}.bg-purple{background:#ede9fe;color:#5b21b6}
.emp-row{display:flex;align-items:center;gap:9px}
.emp-av{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy-lt));
  display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;
  color:#fff;flex-shrink:0;overflow:hidden}
.emp-av img{width:100%;height:100%;object-fit:cover}

/* ─── MODAL ─── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:700px;
  max-height:92vh;overflow-y:auto;box-shadow:var(--shl)}
.modal-lg{max-width:860px}
.modal-xl{max-width:1000px}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;
  z-index:10;border-radius:16px 16px 0 0}
.modal-hdr h3{font-size:15.5px;font-weight:700}
.mc{width:30px;height:30px;border:none;background:var(--light);border-radius:7px;
  cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--border)}
.modal-body{padding:22px 24px}
.modal-ftr{padding:14px 24px 20px;display:flex;gap:9px;justify-content:flex-end;
  border-top:1px solid var(--border)}
.sec-div{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;
  letter-spacing:.8px;padding:12px 0 7px;border-bottom:1.5px solid var(--border);
  margin-bottom:14px;margin-top:4px}

/* ─── IMAGE UPLOAD ─── */
.img-zone{border:2px dashed var(--border);border-radius:11px;padding:18px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative;min-height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.img-zone:hover{border-color:var(--navy-lt);background:var(--light)}
.img-zone.drag-over{border-color:var(--teal);background:#e0f2f1}
.img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-zone img{max-height:80px;max-width:180px;object-fit:contain;border-radius:6px}
.img-zone .ico-big{font-size:36px}
.img-zone .lbl{font-size:12px;color:var(--muted);font-weight:500}
.img-zone .size-info{font-size:11px;color:var(--teal);font-weight:600;
  background:#e0f2f1;padding:3px 10px;border-radius:20px}
.img-zone .limit-txt{font-size:10.5px;color:var(--muted)}
.img-zone.has-img .ico-big{display:none}
.img-zone.has-img .lbl{font-size:10.5px;color:var(--muted)}

/* ─── DOC UPLOAD ─── */
.doc-drop{border:2px dashed var(--border);border-radius:11px;padding:22px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative}
.doc-drop:hover,.doc-drop.drag-over{border-color:var(--navy-lt);background:var(--light)}
.doc-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1px solid var(--border);border-radius:9px;margin-bottom:8px;background:var(--light)}
.doc-item .di-icon{font-size:22px;flex-shrink:0}
.doc-item .di-info{flex:1;min-width:0}
.doc-item .di-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-item .di-meta{font-size:11px;color:var(--muted)}

/* ─── SALARY PANEL ─── */
.salary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.salary-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.net-bar{background:#059669;color:#fff;border-radius:10px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.net-bar .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.85}
.net-bar .val{font-size:22px;font-weight:700}
.calc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;
  border-bottom:1px dashed var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row.total{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:8px;margin-top:4px}
.payroll-summary{background:var(--light);border-radius:11px;padding:16px;margin-top:10px}
.ps-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ps-box{background:#fff;border-radius:9px;padding:12px;border:1px solid var(--border);text-align:center}
.ps-box .ps-lbl{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ps-box .ps-val{font-size:18px;font-weight:700;margin-top:3px}
.ps-box.earn{border-color:rgba(26,35,126,.2)}.ps-box.earn .ps-val{color:var(--navy)}
.ps-box.ded{border-color:rgba(239,68,68,.2)}.ps-box.ded .ps-val{color:var(--red)}
.ps-box.net{border-color:rgba(16,185,129,.2)}.ps-box.net .ps-val{color:var(--green)}

/* ─── TABS ─── */
.tabs{display:flex;gap:3px;background:var(--light);border-radius:9px;padding:3px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--muted);transition:all .18s;border:none;background:none;font-family:inherit}
.tab.active{background:#fff;color:var(--navy);font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.09)}

/* ─── MISC ─── */
.hidden{display:none!important}
.empty-st{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-st .ico{font-size:44px;margin-bottom:10px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:14px;gap:10px}
.spin{width:19px;height:19px;border:2.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.text-muted{color:var(--muted);font-size:12px}
.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.page-hdr h1{font-size:21px;font-weight:700}
.page-hdr p{font-size:13px;color:var(--muted);margin-top:2px}
.doc-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
.doc-card{border:1.5px solid var(--border);border-radius:11px;padding:15px;
  text-align:center;cursor:pointer;transition:all .2s}
.doc-card:hover{border-color:var(--navy-lt);background:var(--light);
  transform:translateY(-2px);box-shadow:var(--sh)}
.doc-card .dc-ico{font-size:25px;margin-bottom:7px}
.doc-card .dc-lbl{font-size:11.5px;font-weight:600;color:var(--text)}
.filter-bar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;
  transform:translateY(-50%);font-size:12px;z-index:1}
.search-wrap input{padding-left:34px}

/* ─── TOAST ─── */
.toast-c{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shl);
  animation:sIn .3s ease;display:flex;align-items:center;gap:7px;min-width:230px}
.toast-s{background:#10b981;color:#fff}.toast-e{background:var(--red);color:#fff}
.toast-i{background:var(--navy);color:#fff}
@keyframes sIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">HR<span>Nexus</span></div>
      <p>Human Resources Management System</p>
    </div>
    <div class="fg"><label>Username</label><input type="text" id="lu" placeholder="Enter username" value="admin"></div>
    <div class="fg"><label>Password</label><input type="password" id="lp" placeholder="Enter password" value="admin123"></div>
    <div id="lerr" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary btn-block" style="padding:13px;font-size:15px" onclick="doLogin()">Sign In →</button>
    <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">Default: admin / admin123</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="title">HR<span>Nexus</span></div>
      <div class="role-badge" id="sb-role">Admin</div>
    </div>
    <div class="sb-user">
      <div class="av" id="sb-av">A</div>
      <div><div class="nm" id="sb-nm">Admin</div><div class="un" id="sb-un">@admin</div></div>
    </div>
    <nav id="sb-nav"></nav>
    <div class="sb-bot">
      <button class="btn btn-outline btn-sm" onclick="logout()"
        style="width:100%;color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)">🚪 Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="tb-date" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast-c" id="toasts"></div>
<div id="mc"></div>

<script>
// ─── STATE & UTILS ────────────────────────────────────────────────────────────
let S = {token:null,role:null,user:null,emp:null};
const $=id=>document.getElementById(id);
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fmt=n=>`₹${parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-IN'):'—';
const fmtSz=b=>{if(!b)return'';if(b<1024)return`${b} B`;if(b<1048576)return`${(b/1024).toFixed(1)} KB`;return`${(b/1048576).toFixed(2)} MB`};

function toast(msg,type='i'){
  const d=document.createElement('div');
  d.className=`toast toast-${type}`;
  d.innerHTML=`<span>${type==='s'?'✅':type==='e'?'❌':'ℹ️'}</span> ${msg}`;
  $('toasts').appendChild(d);
  setTimeout(()=>d.remove(),3600);
}

async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(S.token)h['Authorization']=`Bearer ${S.token}`;
  if(opts.body&&typeof opts.body!=='string')opts.body=JSON.stringify(opts.body);
  const r=await fetch(path,{...opts,headers:{...h,...opts.headers}});
  if(!r.ok){const e=await r.json();throw new Error(e.error||'Request failed')}
  const ct=r.headers.get('content-type')||'';
  if(ct.includes('application/pdf')||ct.includes('octet'))return r.blob();
  return r.json();
}

async function apiUp(path,file,extra={}){
  const fd=new FormData();fd.append('file',file);
  Object.entries(extra).forEach(([k,v])=>fd.append(k,v));
  const r=await fetch(path,{method:'POST',headers:{Authorization:`Bearer ${S.token}`},body:fd});
  if(!r.ok){const e=await r.json();throw new Error(e.error||'Upload failed')}
  return r.json();
}

function dl(blob,name){
  const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
}

function modal(html){
  const ov=document.createElement('div');
  ov.className='modal-ov';ov.innerHTML=html;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  $('mc').appendChild(ov);return ov;
}

// ─── VALIDATION ENGINE ────────────────────────────────────────────────────────
const V={
  required: v=>v&&v.trim()!==''?null:'This field is required',
  email:    v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)?null:'Enter a valid email address',
  phone:    v=>/^[\+]?[0-9\s\-\(\)]{10,15}$/.test(v.replace(/\s/g,''))?null:'Enter a valid phone (10–15 digits)',
  pan:      v=>/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(v.toUpperCase())?null:'PAN must be like ABCDE1234F',
  aadhar:   v=>/^\d{12}$/.test(v.replace(/\s/g,''))?null:'Aadhar must be 12 digits',
  ifsc:     v=>/^[A-Z]{4}0[A-Z0-9]{6}$/.test(v.toUpperCase())?null:'IFSC format: ABCD0123456',
  pincode:  v=>/^\d{6}$/.test(v)?null:'Pincode must be 6 digits',
  gstin:    v=>v===''||/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/.test(v.toUpperCase())?null:'Invalid GSTIN format',
  positive: v=>parseFloat(v)>=0?null:'Must be 0 or positive',
  date:     v=>v&&!isNaN(new Date(v).getTime())?null:'Enter a valid date',
  uan:      v=>v===''||/^\d{12}$/.test(v)?null:'UAN must be 12 digits',
};

function vField(inputEl, ...rules){
  const fg=inputEl.closest('.fg');
  const val=inputEl.value;
  for(const rule of rules){
    const msg=rule(val);
    if(msg){
      inputEl.classList.add('err');
      const em=fg?.querySelector('.err-msg');
      if(em){em.textContent=msg;fg.classList.add('has-err')}
      return false;
    }
  }
  inputEl.classList.remove('err');
  const fg2=inputEl.closest('.fg');
  fg2?.classList.remove('has-err');
  return true;
}

function vForm(selectors){
  let ok=true;
  selectors.forEach(([id,...rules])=>{
    const el=$(id);if(!el)return;
    if(!vField(el,...rules))ok=false;
  });
  return ok;
}

function addLiveValidation(id,...rules){
  const el=$(id);
  if(!el)return;
  el.addEventListener('blur',()=>vField(el,...rules));
  el.addEventListener('input',()=>{if(el.classList.contains('err'))vField(el,...rules)});
}

// ─── IMAGE UPLOAD ZONE HELPER ─────────────────────────────────────────────────
function setupImgZone(zoneId, inputId, maxMB, onFile){
  const zone=$(zoneId), input=$(inputId);
  if(!zone||!input)return;
  function processFile(file){
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['jpg','jpeg','png','gif','webp'].includes(ext)){
      toast(`Only JPG/PNG/GIF/WEBP allowed`,'e');return;
    }
    if(file.size>maxMB*1024*1024){
      toast(`File too large. Max ${maxMB}MB allowed (your file: ${fmtSz(file.size)})`,'e');return;
    }
    // Show preview
    const reader=new FileReader();
    reader.onload=e=>{
      zone.innerHTML=`
        <img src="${e.target.result}" style="max-height:80px;border-radius:8px;object-fit:contain">
        <div class="lbl" style="margin-top:6px">Click to change</div>
        <div class="size-info">📁 ${fmtSz(file.size)}</div>
        <div class="limit-txt">Max allowed: ${maxMB}MB</div>
        <input type="file" id="${inputId}" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">
      `;
      zone.classList.add('has-img');
      setupImgZone(zoneId,inputId,maxMB,onFile);
      onFile(file);
    };
    reader.readAsDataURL(file);
  }
  input.addEventListener('change',e=>processFile(e.target.files[0]));
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');processFile(e.dataTransfer.files[0])});
}

async function doLogin(){
  const u=$('lu').value.trim(),p=$('lp').value;
  $('lerr').style.display='none';
  if(!u||!p){$('lerr').textContent='Enter username and password';$('lerr').style.display='block';return}
  try{
    const r=await api('/api/login',{method:'POST',body:{username:u,password:p}});
    S={...S,token:r.token,role:r.role,user:r.user,emp:r.employee};
    $('login-screen').classList.add('hidden');$('app').classList.remove('hidden');
    initApp();
  }catch(e){$('lerr').textContent=e.message;$('lerr').style.display='block'}
}
$('lp').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());

function logout(){
  S={token:null,role:null,user:null,emp:null};
  $('app').classList.add('hidden');$('login-screen').classList.remove('hidden');
}

function calcFromCTC(){
  const ctc = parseFloat($('ef-ctc').value) || 0;
  if(ctc <= 0) return;
  const monthlyCTC = ctc / 12;
  const basic = monthlyCTC * 0.50; // 50% of monthly CTC
  const hra = basic * 0.50; // 50% of basic
  const pf_employer = Math.min(basic, 15000) * 0.12; 
  // Remaining goes to Special Allowance
  const special = Math.max(0, monthlyCTC - (basic + hra + pf_employer));
  
  const setV=(id,v)=>{const e=$(id);if(e)e.value=Math.round(v)};
  setV('ef-basic', basic); setV('ef-hra', hra); setV('ef-sa', special);
  setV('ef-ta', 0); setV('ef-ma', 0); setV('ef-lta', 0); setV('ef-oa', 0);
  setV('ef-pfe', pf_employer); setV('ef-pfr', pf_employer); // Empl and Empr PF
  autoCalcSalary();
}

function autoCalcSalary(){
  const earn=['ef-basic','ef-hra','ef-ta','ef-ma','ef-sa','ef-lta','ef-oa'];
  const ded=['ef-pfe','ef-esie','ef-pt','ef-tds','ef-od'];
  const gross=earn.reduce((s,id)=>s+(parseFloat($(id)?.value)||0),0);
  const basic=parseFloat($('ef-basic')?.value)||0;
  const pf=Math.min(basic,15000)*0.12;
  const est_ded=ded.reduce((s,id)=>{const v=parseFloat($(id)?.value)||0;return s+v},0)||pf+(gross<=21000?gross*0.0075:0)+(gross>=7500?175:0);
  if($('prev-gross')){
    $('prev-gross').textContent=fmt(gross);
    $('prev-ded').textContent=fmt(est_ded);
    $('prev-net').textContent=fmt(gross-est_ded);
  }
}

  setTimeout(()=>updateMonthDays(), 100);

function updateMonthDays() {
  const m = parseInt($('ps-month')?.value);
  const y = parseInt($('ps-year')?.value);
  if (m && y) {
    const days = new Date(y, m, 0).getDate();
    const wd = $('ps-wd');
    if(wd) wd.value = days;
    const lop = parseFloat($('ps-lop')?.value) || 0;
    const pd = $('ps-pd');
    if(pd) pd.value = Math.max(0, days - lop);
    updatePayroll();
  }
}

async function loadEmpSalary(id){
  if(!id)return;
  const e=await api(`/api/employees/${id}`);
  const fields=[['ps-basic','basic_salary'],['ps-hra','hra'],['ps-ta','transport_allowance'],
                ['ps-ma','medical_allowance'],['ps-sa','special_allowance'],['ps-lta','lta']];
  fields.forEach(([fid,key])=>{const el=$(fid);if(el)el.value=e[key]||0});
  updatePayroll();
}

async function updatePayroll(){
  const d={
    basic_salary:parseFloat($('ps-basic')?.value)||0,hra:parseFloat($('ps-hra')?.value)||0,
    transport_allowance:parseFloat($('ps-ta')?.value)||0,medical_allowance:parseFloat($('ps-ma')?.value)||0,
    special_allowance:parseFloat($('ps-sa')?.value)||0,lta:parseFloat($('ps-lta')?.value)||0,
    other_earnings:parseFloat($('ps-oe')?.value)||0,
    pf_employee:parseFloat($('ps-pfe')?.value)||0,esi_employee:parseFloat($('ps-esie')?.value)||0,
    professional_tax:parseFloat($('ps-pt')?.value)||0,tds:parseFloat($('ps-tds')?.value)||0,
    other_deduction:parseFloat($('ps-od')?.value)||0,advance_deduction:parseFloat($('ps-adv')?.value)||0,
    working_days:parseInt($('ps-wd')?.value)||26,paid_days:parseInt($('ps-pd')?.value)||26,
    is_metro:$('ps-metro')?.value==='1',
  };
  try{
    const r=await api('/api/payroll/compute',{method:'POST',body:d});
    if($('pb-gross')){
      $('pb-gross').textContent=fmt(r.gross_salary);
      $('pb-ded').textContent=fmt(r.total_deductions);
      $('pb-net').textContent=fmt(r.net_salary);
      $('pb-detail').innerHTML=`
        <div>🏦 PF Emp: ${fmt(r.pf_employee)}</div>
        <div>🏥 ESI Emp: ${fmt(r.esi_employee)}</div>
        <div>📊 Prof Tax: ${fmt(r.professional_tax)}</div>
        <div>💼 TDS: ${fmt(r.tds)}</div>
      `;
      // Update override fields with computed values if they were 0
      if(!parseFloat($('ps-pfe')?.value))$('ps-pfr').value=r.pf_employer;
      if(!parseFloat($('ps-esie')?.value))$('ps-esir').value=r.esi_employer;
    }
  }catch(ex){}
}

  // Trigger final compute
  const d={

    basic_salary:parseFloat($('ps-basic').value)||0,hra:parseFloat($('ps-hra').value)||0,
    transport_allowance:parseFloat($('ps-ta').value)||0,medical_allowance:parseFloat($('ps-ma').value)||0,
    special_allowance:parseFloat($('ps-sa').value)||0,lta:parseFloat($('ps-lta').value)||0,
    other_earnings:parseFloat($('ps-oe').value)||0,
    pf_employee:parseFloat($('ps-pfe').value)||0,pf_employer:parseFloat($('ps-pfr').value)||0,
    esi_employee:parseFloat($('ps-esie').value)||0,esi_employer:parseFloat($('ps-esir').value)||0,
    professional_tax:parseFloat($('ps-pt').value)||0,tds:parseFloat($('ps-tds').value)||0,
    advance_deduction:parseFloat($('ps-adv').value)||0,other_deduction:parseFloat($('ps-od').value)||0,
    working_days:parseInt($('ps-wd').value)||26,paid_days:parseInt($('ps-pd').value)||26,
    is_metro:$('ps-metro').value==='1',notes:$('ps-notes').value,

async function genDoc(type,empId){

  Object.entries(fieldMap).forEach(([id,key])=>{const el=$(id);if(el)extra[key]=el.value});

  const data={username:$('uf-un').value,role:$('uf-role').value,
               employee_id:$('uf-emp').value||null,password:pw||undefined};

              ${co.stamp_path?`<img src="/static/${co.stamp_path}?t=${Date.now()}" style="max-height:70px"><div class="lbl">Click to change</div>`:
              `<div class="ico-big">🔏</div><div class="lbl">Click or drag to upload stamp</div>`}
              <div class="limit-txt">PNG with transparent bg recommended · Max 2MB</div>
              <input type="file" id="stamp-inp" accept="image/*">
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-hdr"><h2>✍️ HR Signature</h2><span class="text-muted">Max 2MB • PNG with transparency</span></div>
          <div class="card-body">
            <div class="img-zone" id="sig-zone">
              ${co.hr_signature_path?`<img src="/static/${co.hr_signature_path}?t=${Date.now()}" style="max-height:60px"><div class="lbl">Click to change</div>`:
              `<div class="ico-big">✍️</div><div class="lbl">Click or drag HR signature</div>`}
              <div class="limit-txt">PNG with transparent bg recommended · Max 2MB</div>
              <input type="file" id="sig-inp" accept="image/*">
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Live validations
  addLiveValidation('co-name',V.required);
  addLiveValidation('co-pin',v=>v===''?null:V.pincode(v));
  addLiveValidation('co-phone',v=>v===''?null:V.phone(v));
  addLiveValidation('co-email',v=>v===''?null:V.email(v));
  addLiveValidation('co-gst',v=>v===''?null:V.gstin(v));
  addLiveValidation('co-pan',v=>v===''?null:V.pan(v));

  // Setup drag-drop zones
  const ups=[['logo-zone','logo-inp','logo'],['stamp-zone','stamp-inp','stamp'],['sig-zone','sig-inp','hr_signature']];
  ups.forEach(([zid,iid,type])=>{
    setupImgZone(zid,iid,2,async f=>{
      try{
        const r=await apiUp(`/api/company/upload/${type}`,f);
        toast(`${type.replace('_',' ')} uploaded (${fmtSz(r.size)})!`,'s');
      }catch(ex){toast(ex.message,'e')}
    });
  });
}

async function saveCompany(){
  if(!vForm([['co-name',V.required]]))return;
  const data={name:$('co-name').value,address:$('co-addr').value,city:$('co-city').value,
    state:$('co-state').value,pincode:$('co-pin').value,phone:$('co-phone').value,
    email:$('co-email').value,website:$('co-web').value,gstin:$('co-gst').value,
    pan:$('co-pan').value,cin:$('co-cin').value,tan:$('co-tan').value,
    hr_name:$('co-hrn').value,hr_designation:$('co-hrd').value};
  try{await api('/api/company',{method:'PUT',body:data});toast('Company info saved!','s')}
  catch(ex){toast(ex.message,'e')}
}

          <div style="font-size:18px;font-weight:700">${e.first_name} ${e.last_name}</div>

          <div style="margin-top:7px"><span class="badge bg-green">${e.status}</span></div>
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase">Employee Code</div>
            <div style="font-size:17px;font-weight:700;color:var(--navy)">${e.emp_code}</div>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-body" style="padding:16px">
            <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:8px">Upload Photo</div>
            <div class="img-zone" id="my-photo-zone" style="min-height:80px">
              ${e.photo_path?`<img src="${e.photo_path && e.photo_path.startsWith('http') ? e.photo_path : '/static/' + e.photo_path}" style="max-height:60px;border-radius:50%"><div class="lbl" style="font-size:11px">Click to change</div>`:'<div class="ico-big" style="font-size:24px">📷</div><div class="lbl" style="font-size:11px">Upload photo</div>'}
              <div class="limit-txt">Max 2MB · JPG/PNG</div>
              <input type="file" id="my-photo-inp" accept="image/*">
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-hdr"><h2>Personal Details</h2></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              ${[['Email',e.email],['Phone',e.phone||'—'],['Date of Birth',fmtDate(e.date_of_birth)],
                 ['Gender',e.gender||'—'],['Address',e.address?`${e.address}, ${e.city}`:'—'],
                 ['Emergency Contact',e.emergency_contact||'—']].map(([l,v])=>`
              <div><div style="font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:3px">${l}</div><div style="font-size:13.5px">${v}</div></div>`).join('')}
            </div>
          </div>
        </div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-hdr"><h2>Employment Details</h2></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              ${[['Department',e.department||'—'],['Designation',e.designation||'—'],
                 ['Date of Joining',fmtDate(e.date_of_joining)],['Employment Type',e.employment_type],
                 ['Reporting To',e.manager_name||'—'],['UAN',e.uan_number||'—'],
                 ['Bank',e.bank_name||'—'],['IFSC',e.bank_ifsc||'—']].map(([l,v])=>`
              <div><div style="font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:3px">${l}</div><div style="font-size:13.5px">${v}</div></div>`).join('')}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-hdr"><h2>Salary Details</h2></div>
          <div class="card-body">
            <div class="ps-row">

async function renderMyPayslips(){

  $('content').innerHTML=`
    <div class="page-hdr"><div><h1>My Payslips</h1><p>${ps.length} payslip(s)</p></div>
    <button class="btn btn-amber" onclick="showForm16Self()">🧾 Download Form 16</button></div>

        <td>${fmt(p.gross_salary)}</td>
        <td>${fmt((p.pf_employee||0)+(p.esi_employee||0))}</td>
        <td style="color:var(--red)">${fmt(p.tds)}</td>
        <td style="color:var(--green);font-weight:700">${fmt(p.net_salary)}</td>

function showForm16Self(){
  if(!S.emp)return;
  modal(`<div class="modal">
    <div class="modal-hdr"><h3>Download Form 16</h3><button class="mc" onclick="this.closest('.modal-ov').remove()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Financial Year</label>
        <select id="f16-fy">${[2025,2024,2023].map(y=>`<option value="${y}">${y}–${y+1}</option>`).join('')}</select>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-outline" onclick="this.closest('.modal-ov').remove()">Cancel</button>
      <button class="btn btn-amber" onclick="genDoc('form16',${S.emp.id})">🧾 Download Form 16</button>
    </div>
  </div>`);
}

async function renderMyDocs(){
  if(!S.emp){$('content').innerHTML='<div class="empty-st"><p>No profile linked.</p></div>';return}
  $('content').innerHTML='<div class="loading"><div class="spin"></div></div>';
  const[docs,empDocs]=await Promise.all([
    api(`/api/documents?employee_id=${S.emp.id}`),
    api(`/api/employees/${S.emp.id}/documents`)
  ]);
  const lbl={payslip:'Pay Slip',offer_letter:'Offer Letter',appointment_letter:'Appointment Letter',
    relieving_letter:'Relieving Letter',experience_letter:'Experience Cert',
    increment_letter:'Increment Letter',warning_letter:'Warning Letter',
    termination_letter:'Termination Letter',form16:'Form 16'};
  $('content').innerHTML=`
    <div class="page-hdr"><div><h1>My Documents</h1></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <div class="card">
        <div class="card-hdr"><h2>Generated HR Documents</h2></div>
        <div class="table-wrap">
          <table><thead><tr><th>Type</th><th>Date</th></tr></thead>
          <tbody>${docs.map(d=>`<tr>
            <td><span class="badge ${d.doc_type==='form16'?'bg-purple':'bg-blue'}">${lbl[d.doc_type]||d.doc_type}</span></td>
            <td>${new Date(d.generated_at).toLocaleDateString('en-IN')}</td>
          </tr>`).join('')||`<tr><td colspan="2"><p style="padding:16px;text-align:center;color:var(--muted)">No documents</p></td></tr>`}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><h2>Uploaded Documents (${empDocs.length})</h2></div>
        <div class="card-body">
          ${empDocs.map(d=>`
          <div class="doc-item">
            <div class="di-icon">${getDocIcon(d.file_type)}</div>
            <div class="di-info">
              <div class="di-name">${d.doc_name}</div>
              <div class="di-meta">${DOC_CATS[d.doc_category]||d.doc_category} · ${fmtSz(d.file_size)}</div>
            </div>
            <a href="/static/${d.file_path}" target="_blank" class="btn btn-sm btn-outline">👁️ View</a>
          </div>`).join('')||`<p class="text-muted" style="padding:8px 0">No documents uploaded</p>`}
          <div class="sec-div mt-3">Upload Document</div>
          <div class="form-row">
            <div class="fg"><label>Document Name *</label><input id="my-dn" placeholder="e.g. Aadhar Card"></div>
            <div class="fg"><label>Category</label>
              <select id="my-dc">${Object.entries(DOC_CATS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
            </div>
          </div>
          <div class="doc-drop" style="margin-bottom:8px" onclick="$('my-df').click()">
            <input type="file" id="my-df" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display:none">
            <div style="font-size:24px;margin-bottom:6px">📄</div>
            <div style="font-size:13px;font-weight:600">Click to select file</div>
            <div style="font-size:11px;color:var(--muted)">PDF, JPG, PNG, DOC · Max 5MB</div>
          </div>
          <div id="my-df-info"></div>
          <button class="btn btn-primary mt-3" onclick="uploadMyDoc(${S.emp.id})">⬆️ Upload</button>
        </div>
      </div>
    </div>`;
  $('my-df').addEventListener('change',()=>{
    const f=$('my-df').files[0];
    if(f)$('my-df-info').innerHTML=`<span class="badge bg-blue">📎 ${f.name} · ${fmtSz(f.size)}</span>`;
  });
}

async function uploadMyDoc(eid){
  const name=$('my-dn').value;
  if(!name){toast('Enter document name','e');return}
  const f=$('my-df').files[0];
  if(!f){toast('Select a file','e');return}
  try{
    const r=await apiUp(`/api/employees/${eid}/documents`,f,{doc_name:name,doc_category:$('my-dc').value});
    toast(`Uploaded (${fmtSz(r.size)})!`,'s');
    renderMyDocs();
  }catch(ex){toast(ex.message,'e')}
}
